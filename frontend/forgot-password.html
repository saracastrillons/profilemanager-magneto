<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Recuperar contraseña</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="simple-header">
    <a href="index.html">← Volver al inicio</a>
    <strong>Profile Manager Magneto</strong>
  </header>
  <main class="center-layout">
    <section class="card auth-card">
      <p class="section-label">Seguridad</p>
      <h2>Recuperar contraseña</h2>
      <p>Ingresa tu correo y te enviaremos un enlace seguro.</p>
      <label>Correo electrónico</label>
      <input id="forgotEmail" type="email" placeholder="correo@ejemplo.com" />
      <button type="button" onclick="forgotPassword()">Enviar enlace</button>
      <p id="forgotMsg" class="message"></p>
    </section>
  </main>
  <script src="app.js?v=professional-final"></script>
</body>
</html>
